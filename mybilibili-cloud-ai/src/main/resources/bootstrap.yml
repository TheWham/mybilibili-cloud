spring:
  profiles:
    active: dev
  application:
    name: mybilibili-cloud-ai
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        shared-configs:
          - ${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
          - data-id: seata-common-dev.yml
            group: DEFAULT_GROUP
            refresh: true
